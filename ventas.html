<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriStock - Registro de Ventas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos base */
        body, html { height: 100%; margin: 0; font-family: 'Roboto', sans-serif; background-color: #f8f8f8; overflow: hidden; }
        .layout-wrapper { display: flex; height: 100vh; }
        .sidebar { width: 380px; background-color: #333; background-image: radial-gradient(#444 1.5px, transparent 1.5px); background-size: 18px 18px; color: white; padding: 40px 30px; box-shadow: 10px 0 20px rgba(0,0,0,0.3); z-index: 10; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 50px; background-color: #ececec; overflow-y: auto; }
        
        .marco-input { padding: 10px 20px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.4); display: flex; justify-content: center; }
        .azul { background: linear-gradient(90deg, #04091b, #3b59c4); }
        .gris-marco { background: linear-gradient(90deg, #323c50, #445069); }
        
        .pill-input { width: 100%; padding: 12px; border-radius: 50px; border: none; text-align: center; font-weight: bold; text-transform: uppercase; outline: none; }
        select.pill-input { appearance: none; -webkit-appearance: none; cursor: pointer; color: white !important; }
        option { background-color: #1a1f2c; color: white; }

        .p-dark { background: linear-gradient(to bottom, #3c445a, #1a1f2c); color: #a0aec0; }
        .p-light { background: linear-gradient(to bottom, #a0aec0, #cbd5e0); color: #1a202c; }

        .btn-nutri { background: linear-gradient(to bottom, #86967b, #5c6a56); color: white; border: 1px solid #4a5446; text-transform: uppercase; font-weight: bold; padding: 15px; border-radius: 8px; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-nutri:hover { filter: brightness(1.2); }
        .btn-volver { background: linear-gradient(90deg, #2d45a0, #3b59c4); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-right: 15px; }
        
        .tabla-contenedor { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .table thead { background: #323c50; color: white; }

        /* --- Ajustes para móviles --- */
        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
                box-shadow: none;
            }

            .main-content {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
            }

            .btn-volver {
                font-size: 0.8rem;
                padding: 6px 15px;
            }

            .table th, .table td {
                font-size: 0.9rem;
                padding: 10px;
            }

            /* Tabla con scroll horizontal en móvil */
            .tabla-contenedor {
                overflow-x: auto;
            }

            .tabla-contenedor table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <div class="sidebar">
            <h2 class="text-center mb-4" style="font-weight: 300; letter-spacing: 4px;">NUEVA VENTA</h2>
            <hr style="border-color: #555; margin-bottom: 40px;">
            
            <form id="form-venta">
                <div class="marco-input azul">
                    <select id="producto-select" class="pill-input p-dark" required>
                        <option value="">SELECCIONAR...</option>
                    </select>
                </div>
                
                <div class="marco-input gris-marco">
                    <input type="number" id="cantidad-venta" placeholder="CANTIDAD" class="pill-input p-light" required min="1">
                </div>

                <div class="marco-input azul">
                    <input type="text" id="cliente" placeholder="CLIENTE (OPCIONAL)" class="pill-input p-dark">
                </div>

                <button type="submit" class="btn-nutri mt-3">Registrar Venta</button>
            </form>

            <div class="mt-auto text-center">
                <a href="/logout" style="color: #ff8080; text-decoration: none; font-size: 0.8rem;">CERRAR SESIÓN</a>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h1 style="font-weight: 300; letter-spacing: 6px; color: #111; margin: 0;">HISTORIAL DE VENTAS</h1>
                <div class="d-flex align-items-center">
                    <a href="/menu" class="btn-volver">VOLVER AL MENÚ</a>
                    <span style="background: #333; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">V 1.0</span>
                </div>
            </div>

            <div class="tabla-contenedor">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Total</th>
                            <th>Cliente</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-ventas">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="ventas.js"></script>
</body>
</html>
