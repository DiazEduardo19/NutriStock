<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Suplementos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">NutriStock - Gestión de Suplementos</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card card-body">
                    <h5>Agregar Suplemento</h5>
                    <form id="form-suplemento">
                        <input type="text" id="nombre" placeholder="Nombre (ej. Whey Protein)" class="form-control mb-2" required>
                        <input type="text" id="marca" placeholder="Marca" class="form-control mb-2">
                        <input type="number" id="precio" placeholder="Precio" class="form-control mb-2">
                        <input type="number" id="stock" placeholder="Cantidad" class="form-control mb-2">
                        <button class="btn btn-success w-100">Guardar</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <table class="table table-bordered bg-white shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-suplementos">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
