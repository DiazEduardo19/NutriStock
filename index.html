<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriStock - Gestión de Suplementos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f8f8f8;
            overflow: hidden; 
        }

        .layout-wrapper {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .sidebar {
            width: 380px;
            background-color: #333;
            background-image: radial-gradient(#444 1.5px, transparent 1.5px);
            background-size: 18px 18px;
            color: white;
            padding: 40px 30px;
            box-shadow: 10px 0 20px rgba(0,0,0,0.3);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 50px;
            background: 
                linear-gradient(135deg, #f0f0f0 25%, transparent 25%) -20px 0,
                linear-gradient(225deg, #f0f0f0 25%, transparent 25%) -20px 0,
                linear-gradient(315deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%);
            background-size: 40px 70px;
            background-color: #ececec;
            overflow-y: auto;
        }

        .marco-input {
            padding: 10px 20px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
        }

        .azul { background: linear-gradient(90deg, #2d45a0, #3b59c4); }
        .gris-marco { background: linear-gradient(90deg, #323c50, #445069); }

        .pill-input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            outline: none;
            font-size: 1rem;
        }

        .p-dark { background: linear-gradient(to bottom, #3c445a, #1a1f2c); color: #a0aec0; box-shadow: inset 0 4px 10px rgba(0,0,0,0.7); }
        .p-light { background: linear-gradient(to bottom, #a0aec0, #cbd5e0); color: #1a202c; box-shadow: inset 0 4px 10px rgba(0,0,0,0.4); }

        .tabla-contenedor {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
        }

        .table thead { background: #2d45a0; color: white; text-transform: uppercase; }
        .table th { padding: 20px; border: none; }
        .table td { vertical-align: middle; padding: 15px; font-size: 1.1rem; }

        .btn-nutri {
            background: linear-gradient(to bottom, #86967b, #5c6a56);
            color: white;
            border: 1px solid #4a5446;
            text-transform: uppercase;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-nutri:hover { filter: brightness(1.1); color: white; transform: translateY(-2px); }

        .btn-volver {
            background: linear-gradient(90deg, #2d45a0, #3b59c4);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-volver:hover { color: white; filter: brightness(1.2); }

        .btn-danger-custom {
            background: linear-gradient(to bottom, #a04545, #7a2d2d);
            border: 1px solid #5a1a1a;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- Ajustes para móviles --- */
        @media (max-width: 768px) {
            .layout-wrapper {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
                box-shadow: none;
            }

            .main-content {
                padding: 20px;
                background-size: 30px 50px;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
            }

            .btn-volver {
                font-size: 0.8rem;
                padding: 6px 15px;
            }

            .table th, .table td {
                font-size: 0.9rem;
                padding: 10px;
            }

            /* Tabla con scroll horizontal en móvil */
            .tabla-contenedor {
                overflow-x: auto;
            }

            .tabla-contenedor table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="sidebar">
            <h2 class="text-center mb-4" style="font-weight: 300; letter-spacing: 4px;">PRODUCTO</h2>
            <hr style="border-color: #555; margin-bottom: 40px;">
            
            <form id="form-suplemento">
                <div class="marco-input azul">
                    <input type="text" id="nombre" placeholder="Nombre" class="pill-input p-dark" required>
                </div>
                
                <div class="marco-input gris-marco">
                    <input type="text" id="marca" placeholder="Marca" class="pill-input p-light">
                </div>

                <div class="marco-input azul">
                    <input type="number" id="precio" placeholder="Precio ($)" class="pill-input p-dark">
                </div>

                <div class="marco-input gris-marco">
                    <input type="number" id="stock" placeholder="Cantidad" class="pill-input p-light">
                </div>

                <!-- Botón corregido -->
                <button type="submit" class="btn btn-nutri w-100 mt-3">Guardar Suplemento</button>
            </form>

            <div class="mt-auto text-center">
                <a href="/logout" class="btn-danger-custom">CERRAR SESIÓN</a>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h1 style="font-weight: 300; letter-spacing: 6px; color: #111; margin: 0;">INVENTARIO NUTRISTOCK</h1>
                
                <div class="d-flex align-items-center">
                    <a href="/menu" class="btn-volver">VOLVER AL MENÚ</a>
                    <span style="background: #333; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">V 1.0</span>
                </div>
            </div>

            <div class="tabla-contenedor">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Precio</th>
                            <th>Stock</th>
        <th class="text-center">Acciones</th>
    </tr>
</thead>
<tbody id="tabla-suplementos">
</tbody>
</table>
</div>
</div>
</div>

<!-- Enlace al script de lógica CRUD -->
<script src="index.js"></script>
</body>
</html>
