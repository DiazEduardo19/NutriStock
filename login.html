<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriStock - Inicio de Sesión</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
        }

        /* Fondo */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fondo-login.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .interface-layer {
            height: 100%;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            position: relative;
        }

        /* Logo superpuesto */
        .logo-superpuesto {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 0;
        }

        .logo-superpuesto img {
            width: 915px;
            position: absolute;
            top: -105px;
            left: -165px;
        }

        .form-container {
            width: 850px; 
            margin-right: -50px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .titulo-sesion {
            font-size: 5rem;
            font-weight: 500;
            color: #000;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
            width: 110%;
            text-align: center;
            padding-right: 295px; 
        }

        .marco {
            width: 110%;
            padding: 8px 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        .azul {
            background: linear-gradient(90deg, #2d45a0 0%, #3b59c4 100%);
            margin-left: -300px;
        }

        .gris {
            background: linear-gradient(90deg, #323c50 0%, #445069 100%);
            margin-left: -300px;
        }

        .input-pill {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            outline: none;
            font-weight: bold;
        }

        .pill-dark {
            background: linear-gradient(to bottom, #3c445a, #1a1f2c);
            color: #a0aec0;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }

        .pill-light {
            background: linear-gradient(to bottom, #a0aec0, #cbd5e0);
            color: #1a202c;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
        }

        .btn-verde {
            width: 45%;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(to bottom, #86967b, #5c6a56);
            color: white;
            border: 1px solid #4a5446;
            border-radius: 8px;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            align-self: center;
            margin-left: -500px; 
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-verde:hover {
            filter: brightness(1.1);
        }

        .version-tag {
            position: absolute;
            bottom: 20px;
            right: 30px;
            background: rgba(80, 80, 80, 0.8);
            color: #fff;
            padding: 4px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        /* --- Ajustes para móviles --- */
        @media (max-width: 768px) {
            .interface-layer {
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .form-container {
                width: 95%;
                margin: 0;
                padding: 20px;
            }

            .titulo-sesion {
                font-size: 2rem;
                padding-right: 0;
                width: 100%;
            }

            .marco {
                width: 100%;
                margin-left: 0;
            }

            .azul, .gris {
                margin-left: 0;
            }

            .input-pill {
                font-size: 1rem;
                padding: 12px;
            }

            .btn-verde {
                width: 100%;
                margin-left: 0;
                font-size: 1.2rem;
            }

            .logo-superpuesto img {
                width: 250px;
                top: 0;
                left: 0;
                opacity: 0.2; /* se mantiene como marca de agua pero no estorba */
            }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="interface-layer">
        <!-- Logo como marca de agua detrás de los botones -->
        <div class="logo-superpuesto">
            <img src="Nutri-Stock.png" alt="Logo NutriStock">
        </div>

        <div class="form-container">
            <h1 class="titulo-sesion">Inicio de Sesion</h1>
            
            <form action="/login" method="POST" style="width: 100%; display: flex; flex-direction: column;">
                
                <div class="marco azul">
                    <input type="text" name="usuario" class="input-pill pill-dark" placeholder="Nombre del Usuario" required>
                </div>

                <div class="marco gris">
                    <input type="password" name="password" class="input-pill pill-light" placeholder="CONTRASEÑA" required>
                </div>

                <button type="submit" class="btn-verde">Iniciar Sesion</button>
            </form>
        </div>
    </div>

    <div class="version-tag">Version 1.0</div>

</body>
</html>
